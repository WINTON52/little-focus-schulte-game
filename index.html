<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7faec" />
    <title>小小专注家</title>
    <style>
      :root {
        color: #285d79;
        background: #f7faec;
        font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      }

      * { box-sizing: border-box; }
      body { min-width: 320px; min-height: 100vh; margin: 0; background: #f7faec; }
      button { min-height: 44px; font: inherit; }
      button:not(:disabled) { cursor: pointer; touch-action: manipulation; }
      .rescue-home-art { position: fixed; z-index: 0; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center top; pointer-events: none; transition: opacity .2s ease; }
      body[data-focus-mode="quiet"] .rescue-home-art { opacity: .16; }
      .app { position: relative; z-index: 1; width: min(100%, 920px); min-height: 100vh; margin: 0 auto; padding: max(180px, 25vh) 18px max(28px, env(safe-area-inset-bottom)); }
      .hero { display: flex; width: 100%; align-items: center; justify-content: space-between; gap: 12px; margin: 0 auto 16px; }
      .brand { margin: 0; color: #174f74; font-size: clamp(27px, 6vw, 42px); letter-spacing: .04em; text-shadow: 0 2px 0 rgba(255, 255, 255, .88); }
      .back, .quiet-button { border: 0; border-radius: 999px; padding: 10px 16px; color: #2b647e; background: rgba(255, 255, 255, .9); box-shadow: 0 4px 0 #d5e6e4; font-weight: 800; }
      .back:active, .action:active, .level:active, .tile:active, .mode-button:active { transform: translateY(3px); box-shadow: none; }
      .card { width: min(100%, 670px); margin: 0 auto 16px; padding: clamp(22px, 5vw, 38px); border-radius: 30px; background: rgba(255, 255, 255, .9); box-shadow: 0 10px 30px rgba(41, 101, 108, .12); }
      .card h2 { margin: 0 0 8px; color: #285d79; font-size: clamp(27px, 5vw, 37px); }
      .card h3 { margin: 22px 0 8px; color: #285d79; font-size: clamp(20px, 3.6vw, 25px); }
      p { margin: 0; color: #5d7d85; font-size: clamp(16px, 3vw, 20px); line-height: 1.6; }
      .mission-card { border: 4px solid #ffe18a; text-align: center; }
      .eyebrow { color: #477d75; font-size: 16px; font-weight: 900; letter-spacing: .08em; }
      .mission-name { margin: 4px 0 8px; color: #ed6d2f; font-size: clamp(30px, 6vw, 44px); font-weight: 950; }
      .action { display: inline-block; margin-top: 18px; padding: 15px 25px; border: 0; border-radius: 999px; color: #fff; background: #ff8342; box-shadow: 0 6px 0 #da6827; font-size: 21px; font-weight: 900; }
      .action:disabled { color: #9caeb0; background: #e4ece8; box-shadow: 0 6px 0 #cfd9d4; }
      .section-note { margin-top: 8px; font-size: 15px; }
      .level-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin-top: 16px; }
      .level, .mode-button { border: 0; border-radius: 20px; padding: 12px 10px; color: #285d79; background: #fff; box-shadow: 0 6px 0 #dce9e5; font-weight: 900; }
      .level { min-height: 78px; font-size: 21px; }
      .level small, .mode-button small { display: block; margin-top: 4px; color: #6f8e92; font-size: 13px; font-weight: 700; }
      .level.current { color: #fff; background: #ff9f3f; box-shadow: 0 6px 0 #dc7b1e; }
      .level.current small { color: #fff7e7; }
      .level.locked { color: #9baeb0; background: #eef2f0; box-shadow: 0 6px 0 #d7e0dc; }
      .mode-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
      .mode-button { min-height: 54px; font-size: 16px; }
      .parent-hold { display: block; margin: 23px auto 0; border: 0; color: #68898b; background: transparent; font-size: 15px; text-decoration: underline; }
      .hold-note { min-height: 22px; margin-top: 4px; color: #779397; font-size: 13px; text-align: center; }
      .game { display: flex; width: 100%; flex-direction: column; align-items: center; }
      .game-top { display: grid; width: min(100%, 720px); grid-template-columns: 1fr auto; align-items: center; gap: 12px; margin-bottom: 8px; }
      .find-label { color: #5c7e88; font-size: 19px; font-weight: 900; }
      .target-number { margin: -4px 0 0; color: #ed6d2f; font-size: clamp(52px, 11vw, 82px); font-weight: 950; font-variant-numeric: tabular-nums; line-height: 1; }
      .mode-label { align-self: start; padding: 10px 14px; border-radius: 20px; color: #477d75; background: #e6f3e9; font-size: clamp(15px, 3vw, 19px); font-weight: 900; }
      .message { min-height: 34px; margin: 4px 0 12px; color: #4e8179; font-size: clamp(18px, 3.5vw, 25px); font-weight: 900; text-align: center; }
      .board { display: grid; width: min(96vw, 640px); grid-template-columns: repeat(var(--columns), minmax(0, 1fr)); gap: clamp(4px, 1.1vw, 11px); }
      .tile { aspect-ratio: 1; min-width: 0; padding: 0; border: 0; border-radius: clamp(8px, 2.4vw, 23px); color: #2e637f; background: #fff; box-shadow: 0 6px 0 #dce9e5; font-size: clamp(15px, var(--tile-font-size), 54px); font-weight: 950; font-variant-numeric: tabular-nums; line-height: 1; }
      .tile.done { color: #fff; background: #ff9f3f; box-shadow: 0 6px 0 #dc7b1e; }
      .tile:disabled { cursor: default; }
      .tile:focus-visible, .level:focus-visible, .action:focus-visible, .back:focus-visible, .mode-button:focus-visible, .parent-hold:focus-visible { outline: 4px solid #ffc95a; outline-offset: 3px; }
      .complete-card { overflow: hidden; text-align: center; }
      .complete-art { display: block; width: calc(100% + clamp(50px, 9vw, 90px)); max-width: none; height: auto; margin: clamp(-28px, -5vw, -14px) clamp(-45px, -8vw, -25px) 8px; }
      .real-world-task { margin-top: 18px; padding: 15px; border-radius: 20px; color: #2b6f67; background: #e8f6e5; font-size: clamp(18px, 3.4vw, 23px); font-weight: 900; line-height: 1.5; }
      .summary-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin: 16px 0; }
      .summary-item { padding: 14px; border-radius: 18px; background: #edf7f4; }
      .summary-item strong { display: block; color: #ed6d2f; font-size: clamp(25px, 5vw, 37px); }
      .summary-item span { color: #557b80; font-size: 14px; font-weight: 800; }
      .recent-list { display: grid; gap: 8px; margin: 12px 0 0; }
      .recent-row { display: flex; justify-content: space-between; gap: 12px; padding: 10px 0; border-bottom: 1px solid #dce9e5; color: #4e7179; font-size: 15px; }
      .danger { margin-top: 20px; border: 0; border-radius: 999px; padding: 11px 16px; color: #9a5d50; background: #fff0ea; font-weight: 800; }
      .empty { margin-top: 12px; color: #779397; }
      @media (min-width: 768px) {
        .app { padding-right: 42px; padding-left: 42px; }
        .level-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .board { width: min(76vw, 640px); }
      }
      @media (max-width: 420px) {
        .app { padding-top: max(142px, 20vh); padding-right: 13px; padding-left: 13px; }
        .tile { box-shadow: 0 4px 0 #dce9e5; }
        .tile.done { box-shadow: 0 4px 0 #dc7b1e; }
      }
      @media (prefers-reduced-motion: reduce) { *, *::before, *::after { scroll-behavior: auto !important; transition: none !important; } }
    </style>
  </head>
  <body data-focus-mode="home">
    <img class="rescue-home-art" src="assets/rescue-hq-background.png" alt="" aria-hidden="true" />
    <main class="app" id="app" aria-live="polite" data-focus-mode="quiet"></main>

    <script type="module">
      import {
        DAILY_MAX_LEVEL,
        MAX_LEVEL,
        MIN_LEVEL,
        TRAINING_STORAGE_KEY,
        accuracyFor,
        availableModes,
        completeTraining,
        migrateProfile,
        selectDailyMission,
        summarizeProgress,
      } from "./game-model.js";

      const app = document.querySelector("#app");
      const supportsVoice = "speechSynthesis" in window && "SpeechSynthesisUtterance" in window;
      const state = {
        screen: "child-home",
        profile: readProfile(),
        size: MIN_LEVEL,
        mode: "forward",
        board: [],
        target: 1,
        correctCount: 0,
        wrongTaps: 0,
        startedAt: 0,
        message: "",
        paused: false,
        isDailyMission: false,
        pauseTimer: null,
        clockTimer: null,
        parentHoldTimer: null,
        parentHoldMessage: "",
      };

      function readProfile() {
        try { return migrateProfile(localStorage); } catch { return migrateProfile({}); }
      }

      function saveProfile() {
        try { localStorage.setItem(TRAINING_STORAGE_KEY, JSON.stringify(state.profile)); } catch { /* The session still works if storage is full. */ }
      }

      function todayKey() {
        const now = new Date();
        const offset = now.getTimezoneOffset() * 60000;
        return new Date(now.valueOf() - offset).toISOString().slice(0, 10);
      }

      function shuffle(values) {
        const copy = [...values];
        for (let index = copy.length - 1; index > 0; index -= 1) {
          const swap = Math.floor(Math.random() * (index + 1));
          [copy[index], copy[swap]] = [copy[swap], copy[index]];
        }
        return copy;
      }

      function formatDuration(milliseconds) {
        const seconds = Math.max(0, Math.round(milliseconds / 1000));
        return `${Math.floor(seconds / 60)}分${String(seconds % 60).padStart(2, "0")}秒`;
      }

      function formatPercent(value) {
        return `${Math.round(value * 100)}%`;
      }

      function modeName(mode) {
        return ({ forward: "顺序找", reverse: "倒着找", pause: "停一停" })[mode] || "顺序找";
      }

      function realWorldTask() {
        return ["帮忙把 3 本书送回书架。", "找一找家里 3 个圆圆的东西。", "给一个玩具盖好小被子。", "把 3 块积木放回盒子里。"][(new Date().getDate() - 1) % 4];
      }

      function clearTimers() {
        window.clearTimeout(state.pauseTimer);
        window.clearTimeout(state.parentHoldTimer);
        window.clearInterval(state.clockTimer);
        state.pauseTimer = null;
        state.parentHoldTimer = null;
        state.clockTimer = null;
      }

      function renderHeader(showBack = false) {
        return `<header class="hero"><h1 class="brand">小小专注家</h1>${showBack ? '<button class="back" type="button" data-action="home">回到首页</button>' : ""}</header>`;
      }

      function levelButton(size) {
        const locked = size > state.profile.unlockedLevel;
        const current = size === state.profile.unlockedLevel;
        const status = locked ? "完成前一关才能练" : current ? "现在练习" : "可以回练";
        return `<button class="level ${locked ? "locked" : current ? "current" : ""}" type="button" data-level="${size}" ${locked ? "disabled" : ""}>${size}×${size}<small>${status}</small></button>`;
      }

      function renderHome() {
        const today = todayKey();
        const mission = selectDailyMission(state.profile, today);
        const dailyDone = state.profile.dailyMissionDate === today && state.profile.dailyMissionCompleted;
        const pathLevels = Array.from({ length: DAILY_MAX_LEVEL - MIN_LEVEL + 1 }, (_, index) => levelButton(MIN_LEVEL + index)).join("");
        const challengeLevels = Array.from({ length: MAX_LEVEL - DAILY_MAX_LEVEL }, (_, index) => levelButton(DAILY_MAX_LEVEL + 1 + index)).join("");
        const variationButtons = [];

        for (let size = 4; size <= Math.min(DAILY_MAX_LEVEL, state.profile.unlockedLevel); size += 1) {
          availableModes(state.profile, size).slice(1).forEach((mode) => {
            variationButtons.push(`<button class="mode-button" type="button" data-train="${size}" data-mode="${mode}">${size}×${size} ${modeName(mode)}<small>换一种专注练习</small></button>`);
          });
        }

        app.innerHTML = `${renderHeader()}<section class="card mission-card" data-screen="child-home"><p class="eyebrow">今天的救援任务</p><p class="mission-name">${mission.size}×${mission.size} · ${modeName(mission.mode)}</p><p>${dailyDone ? "今天已经完成啦！可以回练一关，明天再来救援。" : "安静找完所有数字，再去完成一个小小真实救援。"}</p><button class="action" type="button" data-action="daily" ${dailyDone ? "disabled" : ""}>${dailyDone ? "今天已完成" : "开始今天的任务"}</button></section><section class="card"><h2>练习小路</h2><p>从 3×3 开始，一关一关稳稳地练。</p><div class="level-grid">${pathLevels}</div>${variationButtons.length ? `<h3>换一种练习</h3><div class="mode-row">${variationButtons.join("")}</div>` : ""}</section><section class="card"><h2>超能挑战</h2><p>6×6 到 10×10，等前面的练习稳定完成后再来挑战。</p><div class="level-grid">${challengeLevels}</div><p class="section-note">只能按顺序解锁，但已经学会的关卡可以随时回练。</p>${supportsVoice ? `<button class="quiet-button" type="button" data-action="toggle-voice">语音：${state.profile.voiceEnabled ? "开" : "关"}</button>` : ""}<button class="parent-hold" type="button" data-action="parent-hold">给大人看</button><p class="hold-note">${state.parentHoldMessage || "按住两秒打开"}</p></section>`;
      }

      function tileIsDone(value) {
        return state.mode === "reverse" ? value > state.target : value < state.target;
      }

      function renderGame() {
        const fontSize = Math.min(54, Math.max(16, Math.floor(270 / state.size)));
        const listenButton = supportsVoice && state.profile.voiceEnabled ? '<button class="quiet-button" type="button" data-action="listen">听一遍</button>' : "";
        app.innerHTML = `${renderHeader(true)}<section class="game" data-screen="game"><div class="game-top"><div><p class="find-label">现在要找</p><p class="target-number">${state.target}</p></div><div class="mode-label">${modeName(state.mode)}</div></div><p class="message">${state.message || "慢慢找，按自己的节奏来。"}</p>${listenButton}<div class="board" style="--columns:${state.size}; --tile-font-size:${fontSize}px" aria-label="${state.size}×${state.size} 数字棋盘"></div></section>`;
        const board = app.querySelector(".board");
        state.board.forEach((value) => {
          const tile = document.createElement("button");
          tile.type = "button";
          tile.className = `tile${tileIsDone(value) ? " done" : ""}`;
          tile.textContent = value;
          tile.dataset.value = value;
          tile.disabled = tileIsDone(value);
          tile.setAttribute("aria-label", `数字 ${value}`);
          board.append(tile);
        });
      }

      function renderMissionComplete() {
        app.innerHTML = `${renderHeader(true)}<section class="card complete-card" data-screen="mission-complete"><img class="complete-art" src="assets/rescue-complete-banner.png" alt="救援小队为你庆祝" /><h2>救援完成！</h2><p>你刚刚认真地完成了一次专注练习。</p><p class="real-world-task">今天的真实救援：${realWorldTask()}</p><button class="action" type="button" data-action="home">回到首页</button></section>`;
      }

      function renderParentDashboard() {
        const summary = summarizeProgress(state.profile, new Date());
        const recent = summary.recentThree.records.slice().reverse();
        const recentRows = recent.length ? recent.map((entry) => `<div class="recent-row"><span>${entry.date} · ${entry.size}×${entry.size} · ${modeName(entry.mode)}</span><span>${formatPercent(entry.accuracy)} · 错 ${entry.wrongTaps} · ${formatDuration(entry.durationMs)}</span></div>`).join("") : '<p class="empty">还没有训练记录。</p>';
        app.innerHTML = `${renderHeader(true)}<section class="card" data-screen="parent-dashboard"><h2>家长小看板</h2><p>数据只保存在这台设备，不上传网络。</p><div class="summary-grid"><div class="summary-item"><strong>${summary.completedLastSevenDays}</strong><span>近 7 天完成次数</span></div><div class="summary-item"><strong>${summary.recommendedLevel}×${summary.recommendedLevel}</strong><span>建议下一次练习</span></div><div class="summary-item"><strong>${summary.recentThree.averageWrongTaps.toFixed(1)}</strong><span>最近 3 次平均错误</span></div><div class="summary-item"><strong>${formatDuration(summary.recentThree.averageDurationMs)}</strong><span>最近 3 次平均用时</span></div></div><h3>最近三次</h3><div class="recent-list">${recentRows}</div>${supportsVoice ? `<button class="quiet-button" type="button" data-action="toggle-voice">语音：${state.profile.voiceEnabled ? "开" : "关"}</button>` : ""}<button class="danger" type="button" data-action="reset-progress">清除这台设备的训练记录</button></section>`;
      }

      function render() {
        document.body.dataset.focusMode = state.screen === "game" ? "quiet" : "home";
        if (state.screen === "child-home") renderHome();
        else if (state.screen === "mission-complete") renderMissionComplete();
        else if (state.screen === "parent-dashboard") renderParentDashboard();
        else renderGame();
      }

      function startTraining(size, mode = "forward", isDailyMission = false) {
        if (size < MIN_LEVEL || size > state.profile.unlockedLevel || size > MAX_LEVEL) return;
        if (!availableModes(state.profile, size).includes(mode)) return;
        clearTimers();
        state.screen = "game";
        state.size = size;
        state.mode = mode;
        state.board = shuffle(Array.from({ length: size * size }, (_, index) => index + 1));
        state.target = mode === "reverse" ? size * size : 1;
        state.correctCount = 0;
        state.wrongTaps = 0;
        state.startedAt = performance.now();
        state.message = mode === "reverse" ? "从最大的数字开始，慢慢找。" : "从 1 开始，慢慢找。";
        state.paused = false;
        state.isDailyMission = isDailyMission;
        state.clockTimer = window.setInterval(() => {}, 1000);
        render();
      }

      function finishTraining() {
        const total = state.size * state.size;
        const record = {
          date: todayKey(),
          size: state.size,
          mode: state.mode,
          durationMs: Math.max(0, performance.now() - state.startedAt),
          wrongTaps: state.wrongTaps,
          accuracy: accuracyFor(total, state.wrongTaps),
        };
        window.clearInterval(state.clockTimer);
        state.profile = completeTraining(state.profile, record);
        if (state.isDailyMission) {
          state.profile = { ...state.profile, dailyMissionDate: record.date, dailyMissionCompleted: true };
        }
        saveProfile();
        state.screen = state.isDailyMission ? "mission-complete" : "child-home";
        render();
      }

      function handleTileTap(value) {
        if (state.screen !== "game") return;
        if (state.paused) {
          state.message = "救援队静一静，等一下再点。";
          render();
          return;
        }
        if (value !== state.target) {
          state.wrongTaps += 1;
          state.message = `先吸一口气，再找 ${state.target}`;
          render();
          return;
        }
        state.correctCount += 1;
        const total = state.size * state.size;
        if (state.correctCount === total) {
          finishTraining();
          return;
        }
        state.target += state.mode === "reverse" ? -1 : 1;
        if (state.mode === "pause" && state.correctCount % 3 === 0) {
          state.paused = true;
          state.message = "救援队静一静，等一下再点。";
          render();
          state.pauseTimer = window.setTimeout(() => {
            state.paused = false;
            state.message = `很好，继续找 ${state.target}`;
            render();
          }, 1200);
          return;
        }
        state.message = `很好，继续找 ${state.target}`;
        render();
      }

      function speakCurrentTask() {
        if (!supportsVoice || !state.profile.voiceEnabled || state.screen !== "game") return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(`现在要找 ${state.target}`);
        utterance.lang = "zh-CN";
        window.speechSynthesis.speak(utterance);
      }

      function startParentHold() {
        state.parentHoldMessage = "继续按住…";
        render();
        state.parentHoldTimer = window.setTimeout(() => {
          state.parentHoldTimer = null;
          state.parentHoldMessage = "";
          state.screen = "parent-dashboard";
          render();
        }, 2000);
      }

      function cancelParentHold() {
        if (!state.parentHoldTimer) return;
        window.clearTimeout(state.parentHoldTimer);
        state.parentHoldTimer = null;
        state.parentHoldMessage = "按住两秒打开";
        render();
      }

      app.addEventListener("click", (event) => {
        const action = event.target.closest("[data-action]")?.dataset.action;
        if (action === "home") {
          clearTimers();
          state.screen = "child-home";
          state.parentHoldMessage = "";
          render();
          return;
        }
        if (action === "daily") {
          const mission = selectDailyMission(state.profile, todayKey());
          startTraining(mission.size, mission.mode, true);
          return;
        }
        if (action === "toggle-voice") {
          state.profile = { ...state.profile, voiceEnabled: !state.profile.voiceEnabled };
          saveProfile();
          render();
          return;
        }
        if (action === "listen") { speakCurrentTask(); return; }
        if (action === "reset-progress") {
          if (window.confirm("确定清除这台 iPad 上的训练记录吗？")) {
            try {
              localStorage.removeItem(TRAINING_STORAGE_KEY);
              localStorage.removeItem("little-focus-unlocked");
            } catch { /* A fresh in-memory profile is still safe. */ }
            state.profile = migrateProfile({});
            state.screen = "child-home";
            render();
          }
          return;
        }
        const level = event.target.closest("[data-level]")?.dataset.level;
        if (level) { startTraining(Number(level)); return; }
        const training = event.target.closest("[data-train]");
        if (training) { startTraining(Number(training.dataset.train), training.dataset.mode); return; }
        const value = event.target.closest("[data-value]")?.dataset.value;
        if (value) handleTileTap(Number(value));
      });

      app.addEventListener("pointerdown", (event) => {
        if (event.target.closest('[data-action="parent-hold"]')) startParentHold();
      });
      ["pointerup", "pointercancel", "pointerleave"].forEach((eventName) => app.addEventListener(eventName, cancelParentHold));

      render();
    </script>
  </body>
</html>
